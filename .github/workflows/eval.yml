name: Evaluation

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: |
          pip install -r services/intake/requirements.txt
          pip install -r services/classifier/requirements.txt
          pip install -r services/router/requirements.txt
      - name: Run tests
        run: pytest tests/ -v

  run-eval:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r services/intake/requirements.txt
          pip install -r services/classifier/requirements.txt
          pip install -r services/router/requirements.txt

      - name: Run prompt comparison
        run: |
          python -m evaluation.run_baseline --compare \
            --dataset data/ticket_dataset_v1.json \
            --output-dir evaluation \
            --comparison-output evaluation/checkpoint3_comparison.json \
            --markdown-output evaluation/checkpoint3_comparison.md

      - name: Run CP3 evaluation
        run: |
          python -m evaluation.run_eval \
            --dataset data/ticket_dataset_v2.json \
            --output evaluation/checkpoint3_results.json
