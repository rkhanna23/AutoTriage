name: Evaluation

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: |
          pip install -r services/intake/requirements.txt
          pip install -r services/classifier/requirements.txt
          pip install -r services/router/requirements.txt
      - name: Run tests
        run: pytest tests/ -v

  verify-eval:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r services/intake/requirements.txt
          pip install -r services/classifier/requirements.txt
          pip install -r services/router/requirements.txt

      - name: Verify evaluation scripts compile
        run: |
          python -m py_compile \
            evaluation/run_baseline.py \
            evaluation/run_eval.py \
            services/classifier/classifier.py \
            services/classifier/main.py \
            services/intake/main.py \
            services/router/main.py

      - name: Verify evaluation CLI surfaces
        run: |
          python -m evaluation.run_baseline --help
          python -m evaluation.run_eval --help
